⚙️ 𝐖𝐡𝐚𝐭 𝐊𝐮𝐛𝐞𝐫𝐧𝐞𝐭𝐞𝐬 𝐃𝐨𝐞𝐬 𝐢𝐧 𝐏𝐫𝐨𝐝𝐮𝐜𝐭𝐢𝐨𝐧:
▪ Self-healing — crashed containers restart automatically
▪ Horizontal scaling — pods scale out under load, scale in when quiet
▪ Rolling deployments — zero downtime releases
▪ Load distribution — traffic balanced across healthy pods
▪ Resource management — CPU and memory allocated efficiently

